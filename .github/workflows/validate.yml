name: Validate Skill

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pytest

      - name: Compile scripts
        run: python -m py_compile scripts/validate_skill.py scripts/extract_paper_assets.py scripts/package_skill.py scripts/package_codex_adapter.py

      - name: Validate Skill package
        run: python scripts/validate_skill.py .

      - name: Run tests
        run: python -m pytest tests -q

      - name: Build release packages
        run: python scripts/package_skill.py .

      - name: Build Codex adapter package
        run: python scripts/package_codex_adapter.py .

      - name: Unpack and release-check Claude Skill
        run: |
          mkdir -p /tmp/claude-release-check
          python - <<'PY'
          import zipfile
          from pathlib import Path
          dist = Path("dist")
          # Find Claude Skill zip (not codex adapter)
          zips = [z for z in sorted(dist.glob("*.zip")) if "codex" not in z.name]
          if not zips:
              print("No Claude Skill .zip found in dist/")
              raise SystemExit(1)
          archive = zips[-1]
          target = Path("/tmp/claude-release-check")
          with zipfile.ZipFile(archive, "r") as zf:
              zf.extractall(target)
          print(f"Unpacked {archive} to {target}")
          PY
          python scripts/validate_skill.py /tmp/claude-release-check/paper-innovation-analyst --release

      - name: Unpack and release-check Codex Adapter
        run: |
          mkdir -p /tmp/codex-release-check
          python - <<'PY'
          import zipfile
          from pathlib import Path
          dist = Path("dist")
          # Find Codex Adapter zip
          zips = [z for z in sorted(dist.glob("*codex*.zip"))]
          if not zips:
              print("No Codex Adapter .zip found in dist/")
              raise SystemExit(1)
          archive = zips[-1]
          target = Path("/tmp/codex-release-check")
          with zipfile.ZipFile(archive, "r") as zf:
              zf.extractall(target)
          print(f"Unpacked {archive} to {target}")
          PY
          python scripts/validate_skill.py /tmp/codex-release-check/paper-innovation-analyst --release
